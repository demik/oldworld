# ATTiny45 Fuse Configuration for minipro (TL866/T48 programmer)
#
# IMPORTANT: This file configures the ATTiny45 fuses
# Incorrect settings can brick your device!
#
# Fuse Bit Descriptions:
# =====================
#
# Low Fuse (LFUSE): 0xE2
# -----------------------
# Bit 7    CKDIV8   = 1 (don't divide clock by 8)
# Bit 6    CKOUT    = 1 (no clock output)
# Bit 5:4  SUT      = 10 (slowly rising power)
# Bit 3:0  CKSEL    = 0010 (8MHz internal RC oscillator)
# Result: 11100010 = 0xE2
#
# High Fuse (HFUSE): 0xDF
# -----------------------
# Bit 7    RSTDISBL = 1 (RESET pin enabled - DO NOT CHANGE)
# Bit 6    DWEN     = 1 (debugWIRE disabled)
# Bit 5    SPIEN    = 0 (SPI programming enabled - DO NOT CHANGE)
# Bit 4    WDTON    = 1 (watchdog not always on)
# Bit 3    EESAVE   = 1 (EEPROM not preserved through chip erase)
# Bit 2:0  BODLEVEL = 111 (brown-out detection disabled)
# Result: 11011111 = 0xDF
#
# Extended Fuse (EFUSE): 0xFF
# ---------------------------
# Bit 2:0  SELFPRGEN = 111 (self programming disabled)
# Result: 11111111 = 0xFF
#
# CRITICAL WARNINGS:
# - DO NOT program RSTDISBL (keep bit 7 of HFUSE = 1)
# - DO NOT program SPIEN (keep bit 5 of HFUSE = 0)
# - Changing these requires high-voltage programming to recover
#
# Configuration for 8MHz internal oscillator:
# -------------------------------------------

# Fuse Low Byte
fuse_low = 0xE2

# Fuse High Byte
fuse_high = 0xDF

# Extended Fuse Byte
fuse_ext = 0xFF

# Lock Bits (optional)
# 0xFF = no memory lock features enabled
lock = 0xFF
